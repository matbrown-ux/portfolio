<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- search rankings motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">RANKINGS</text>

    <!-- rank 1 (highlight) -->
    <text x="1140" y="312" fill="#f86343" font-size="26" font-weight="600">01</text>
    <rect x="1186" y="288" width="280" height="36" rx="8" fill="#f86343" opacity="0.16"/>
    <rect x="1198" y="300" width="180" height="12" rx="6" fill="#f86343"/>

    <text x="1140" y="392" fill="#7a7060" font-size="26">02</text>
    <rect x="1186" y="368" width="280" height="36" rx="8" fill="#f5f0e8" opacity="0.06"/>
    <rect x="1198" y="380" width="150" height="12" rx="6" fill="#f5f0e8" opacity="0.3"/>

    <text x="1140" y="472" fill="#7a7060" font-size="26">03</text>
    <rect x="1186" y="448" width="280" height="36" rx="8" fill="#f5f0e8" opacity="0.06"/>
    <rect x="1198" y="460" width="120" height="12" rx="6" fill="#f5f0e8" opacity="0.22"/>

    <!-- ascending arrow -->
    <polyline points="1150,580 1230,540 1310,500 1400,440 1460,400" fill="none" stroke="#f86343" stroke-width="3"/>
    <circle cx="1460" cy="400" r="6" fill="#f5f0e8"/>

    <text x="1140" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Rankings that compound</text>
    <text x="1140" y="742" fill="#7a7060" font-size="24">Earned through architecture</text>
  </g>

  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>
  <text x="106" y="430" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">Technical</text>
  <text x="106" y="565" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">SEO</text>
  <text x="112" y="650" fill="#7a7060" font-size="28">Core Web Vitals · Crawl · Schema</text>
</svg>
