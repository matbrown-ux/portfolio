<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- token / component grid motif -->
  <g>
    <text x="1150" y="200" fill="#7a7060" font-size="22" letter-spacing="2">TOKENS</text>
    <g>
      <rect x="1150" y="300" width="92" height="92" rx="16" fill="#f86343"/>
      <rect x="1262" y="300" width="92" height="92" rx="16" fill="#f5f0e8" opacity="0.16"/>
      <rect x="1374" y="300" width="92" height="92" rx="16" fill="#f5f0e8" opacity="0.10"/>
      <rect x="1150" y="412" width="92" height="92" rx="16" fill="#f5f0e8" opacity="0.10"/>
      <rect x="1262" y="412" width="92" height="92" rx="16" fill="#f86343" opacity="0.55"/>
      <rect x="1374" y="412" width="92" height="92" rx="16" fill="#f5f0e8" opacity="0.16"/>
      <rect x="1150" y="524" width="92" height="92" rx="16" fill="#f5f0e8" opacity="0.16"/>
      <rect x="1262" y="524" width="92" height="92" rx="16" fill="#f5f0e8" opacity="0.10"/>
      <rect x="1374" y="524" width="92" height="92" rx="16" fill="#f86343" opacity="0.3"/>
    </g>
    <text x="1150" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Tokens &amp; components</text>
    <text x="1150" y="742" fill="#7a7060" font-size="24">One source of truth</text>
  </g>

  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>
  <text x="106" y="430" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">Design</text>
  <text x="106" y="565" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">Systems</text>
  <text x="112" y="650" fill="#7a7060" font-size="28">Tokens · Components · Patterns</text>
</svg>
