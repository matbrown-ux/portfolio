<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- AI answer motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">AI ANSWERS</text>

    <!-- prompt line -->
    <rect x="1140" y="260" width="200" height="40" rx="20" fill="#f5f0e8" opacity="0.06"/>
    <rect x="1158" y="276" width="120" height="10" rx="5" fill="#f5f0e8" opacity="0.3"/>

    <!-- answer card -->
    <rect x="1140" y="330" width="320" height="200" rx="16" fill="#141414" stroke="#1c1c1c"/>
    <rect x="1164" y="362" width="272" height="12" rx="6" fill="#f5f0e8" opacity="0.18"/>
    <rect x="1164" y="392" width="240" height="12" rx="6" fill="#f5f0e8" opacity="0.12"/>
    <rect x="1164" y="422" width="260" height="12" rx="6" fill="#f5f0e8" opacity="0.12"/>
    <!-- citation pill -->
    <rect x="1164" y="466" width="150" height="38" rx="19" fill="#f86343"/>
    <text x="1186" y="491" fill="#090909" font-size="20" font-weight="600">cited ↗</text>

    <text x="1140" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Be the cited source</text>
    <text x="1140" y="742" fill="#7a7060" font-size="24">ChatGPT · Perplexity · Claude</text>
  </g>

  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>
  <text x="106" y="490" fill="#f5f0e8" font-size="200" font-weight="700" letter-spacing="-6">AEO</text>
  <text x="112" y="580" fill="#7a7060" font-size="28">Answer engine optimization</text>
</svg>
