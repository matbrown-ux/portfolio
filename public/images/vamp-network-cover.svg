<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>

  <!-- right motif panel -->
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- analytics motif: bars + ascending line -->
  <g>
    <rect x="1120" y="470" width="46" height="120" fill="#f5f0e8" opacity="0.16"/>
    <rect x="1186" y="420" width="46" height="170" fill="#f5f0e8" opacity="0.16"/>
    <rect x="1252" y="360" width="46" height="230" fill="#f5f0e8" opacity="0.22"/>
    <rect x="1318" y="300" width="46" height="290" fill="#f86343"/>
    <rect x="1384" y="250" width="46" height="340" fill="#f86343" opacity="0.55"/>
    <polyline points="1143,560 1209,500 1275,470 1341,380 1407,300 1473,250"
      fill="none" stroke="#f86343" stroke-width="3"/>
    <g fill="#f5f0e8">
      <circle cx="1143" cy="560" r="6"/><circle cx="1209" cy="500" r="6"/>
      <circle cx="1275" cy="470" r="6"/><circle cx="1341" cy="380" r="6"/>
      <circle cx="1407" cy="300" r="6"/><circle cx="1473" cy="250" r="6"/>
    </g>
    <!-- stat chips -->
    <text x="1120" y="200" fill="#7a7060" font-size="22" letter-spacing="2">ANALYTICS</text>
    <text x="1120" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Creators · Brands</text>
    <text x="1120" y="744" fill="#7a7060" font-size="24">Campaign performance dashboard</text>
  </g>

  <!-- left content -->
  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">CASE STUDY — 01</text>

  <text x="106" y="430" fill="#f5f0e8" font-size="140" font-weight="700" letter-spacing="-5">Vamp</text>
  <text x="106" y="560" fill="#f5f0e8" font-size="140" font-weight="700" letter-spacing="-5">Network</text>

  <text x="112" y="640" fill="#7a7060" font-size="28">Creative direction · Product · AI workflows</text>

  <!-- tags -->
  <g font-size="22" fill="#f5f0e8">
    <rect x="112" y="730" width="240" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="140" y="763">Creative Direction</text>
    <rect x="368" y="730" width="248" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="396" y="763">UX/UI Engineering</text>
    <rect x="632" y="730" width="172" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="660" y="763">AI Workflows</text>
  </g>
</svg>
