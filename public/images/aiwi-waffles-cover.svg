<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
    <pattern id="waffle" x="0" y="0" width="78" height="78" patternUnits="userSpaceOnUse">
      <rect x="6" y="6" width="66" height="66" rx="14" fill="#f86343"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>

  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- waffle mark motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">BRAND MARK</text>
    <!-- waffle body -->
    <rect x="1160" y="300" width="312" height="312" rx="40" fill="#7a3a2a" opacity="0.35"/>
    <rect x="1160" y="300" width="312" height="312" rx="40" fill="none" stroke="#f86343" stroke-width="2"/>
    <!-- pockets clipped to the body -->
    <clipPath id="body"><rect x="1160" y="300" width="312" height="312" rx="40"/></clipPath>
    <g clip-path="url(#body)">
      <rect x="1160" y="300" width="312" height="312" fill="url(#waffle)" opacity="0.9"/>
    </g>
    <text x="1140" y="710" fill="#f5f0e8" font-size="40" font-weight="600">Identity · Signage</text>
    <text x="1140" y="752" fill="#7a7060" font-size="24">Store, food truck &amp; merch</text>
  </g>

  <!-- left content -->
  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">CASE STUDY — 03</text>

  <text x="106" y="430" fill="#f5f0e8" font-size="140" font-weight="700" letter-spacing="-5">&#8217;Aiwi</text>
  <text x="106" y="560" fill="#f5f0e8" font-size="140" font-weight="700" letter-spacing="-5">Waffles</text>

  <text x="112" y="640" fill="#7a7060" font-size="28">Branding &amp; Shopify storefront</text>

  <g font-size="22" fill="#f5f0e8">
    <rect x="112" y="730" width="160" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="140" y="763">Branding</text>
    <rect x="288" y="730" width="200" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="316" y="763">UX/UI Design</text>
    <rect x="504" y="730" width="148" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="532" y="763">Shopify</text>
    <rect x="668" y="730" width="132" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="696" y="763">SEO/AEO</text>
  </g>
</svg>
