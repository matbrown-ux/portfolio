<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- automation pipeline motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">AUTOMATION</text>

    <!-- input -->
    <rect x="1180" y="260" width="240" height="64" rx="12" fill="none" stroke="#1c1c1c"/>
    <text x="1212" y="300" fill="#f5f0e8" font-size="24">Trigger</text>
    <path d="M1300 324 V356" fill="none" stroke="#7a7060" stroke-width="2"/>
    <polygon points="1300,366 1294,354 1306,354" fill="#7a7060"/>

    <!-- AI step (highlight) -->
    <rect x="1180" y="372" width="240" height="64" rx="12" fill="#f86343"/>
    <text x="1212" y="412" fill="#090909" font-size="24" font-weight="600">AI step</text>
    <path d="M1300 436 V468" fill="none" stroke="#f86343" stroke-width="2"/>
    <polygon points="1300,478 1294,466 1306,466" fill="#f86343"/>

    <!-- output -->
    <rect x="1180" y="484" width="240" height="64" rx="12" fill="none" stroke="#1c1c1c"/>
    <text x="1212" y="524" fill="#f5f0e8" font-size="24">Output</text>

    <text x="1140" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Hours saved weekly</text>
    <text x="1140" y="742" fill="#7a7060" font-size="24">MCP · n8n · pipelines</text>
  </g>

  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>
  <text x="106" y="430" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">AI</text>
  <text x="106" y="565" fill="#f5f0e8" font-size="140" font-weight="700" letter-spacing="-5">Automation</text>
  <text x="112" y="650" fill="#7a7060" font-size="28">Pipelines · MCP · Integration</text>
</svg>
