<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="waffle2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="4" y="4" width="32" height="32" rx="8" fill="#f86343"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#0e0e0e"/>
  <rect x="0" y="0" width="1200" height="48" fill="#090909"/>
  <circle cx="28" cy="24" r="6" fill="#f86343"/>
  <circle cx="50" cy="24" r="6" fill="#7a7060"/>
  <circle cx="72" cy="24" r="6" fill="#7a7060"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#1c1c1c"/>

  <!-- logo cell -->
  <rect x="80" y="96" width="500" height="200" rx="14" fill="#141414" stroke="#1c1c1c"/>
  <text x="104" y="134" fill="#7a7060" font-size="16" letter-spacing="3">LOGO</text>
  <clipPath id="m2"><rect x="250" y="150" width="100" height="100" rx="24"/></clipPath>
  <rect x="250" y="150" width="100" height="100" rx="24" fill="#7a3a2a" opacity="0.35"/>
  <g clip-path="url(#m2)"><rect x="250" y="150" width="100" height="100" fill="url(#waffle2)" opacity="0.9"/></g>

  <!-- palette cell -->
  <rect x="620" y="96" width="500" height="200" rx="14" fill="#141414" stroke="#1c1c1c"/>
  <text x="644" y="134" fill="#7a7060" font-size="16" letter-spacing="3">PALETTE</text>
  <rect x="644" y="160" width="90" height="90" rx="10" fill="#f86343"/>
  <rect x="750" y="160" width="90" height="90" rx="10" fill="#f5f0e8"/>
  <rect x="856" y="160" width="90" height="90" rx="10" fill="#7a3a2a"/>
  <rect x="962" y="160" width="90" height="90" rx="10" fill="#1c1c1c" stroke="#7a7060"/>

  <!-- apparel cell -->
  <rect x="80" y="330" width="500" height="210" rx="14" fill="#141414" stroke="#1c1c1c"/>
  <text x="104" y="368" fill="#7a7060" font-size="16" letter-spacing="3">MERCH</text>
  <path d="M270 400 l40 -18 h60 l40 18 -22 34 -18 -10 v74 h-100 v-74 l-18 10 z" fill="#f5f0e8" opacity="0.16"/>

  <!-- packaging cell -->
  <rect x="620" y="330" width="500" height="210" rx="14" fill="#141414" stroke="#1c1c1c"/>
  <text x="644" y="368" fill="#7a7060" font-size="16" letter-spacing="3">PACKAGING</text>
  <path d="M820 396 l60 22 v66 l-60 22 -60 -22 v-66 z" fill="#f86343" opacity="0.5"/>
  <path d="M820 396 l60 22 -60 22 -60 -22 z" fill="#f86343"/>

  <text x="600" y="610" text-anchor="middle" fill="#7a7060" font-size="20" letter-spacing="4">BRAND &amp; MERCH PLACEHOLDER</text>
</svg>
