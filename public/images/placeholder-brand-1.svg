<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="waffle" x="0" y="0" width="52" height="52" patternUnits="userSpaceOnUse">
      <rect x="5" y="5" width="42" height="42" rx="10" fill="#f86343"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#0e0e0e"/>
  <!-- window chrome -->
  <rect x="0" y="0" width="1200" height="48" fill="#090909"/>
  <circle cx="28" cy="24" r="6" fill="#f86343"/>
  <circle cx="50" cy="24" r="6" fill="#7a7060"/>
  <circle cx="72" cy="24" r="6" fill="#7a7060"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#1c1c1c"/>

  <!-- product image -->
  <rect x="80" y="96" width="470" height="470" rx="16" fill="#141414" stroke="#1c1c1c"/>
  <clipPath id="mark"><rect x="225" y="240" width="180" height="180" rx="40"/></clipPath>
  <rect x="225" y="240" width="180" height="180" rx="40" fill="#7a3a2a" opacity="0.35"/>
  <g clip-path="url(#mark)"><rect x="225" y="240" width="180" height="180" fill="url(#waffle)" opacity="0.9"/></g>

  <!-- product details -->
  <text x="610" y="150" fill="#7a7060" font-size="20" letter-spacing="3">PRODUCT</text>
  <rect x="610" y="178" width="360" height="24" rx="6" fill="#f5f0e8" opacity="0.2"/>
  <rect x="610" y="216" width="240" height="24" rx="6" fill="#f5f0e8" opacity="0.12"/>
  <text x="610" y="320" fill="#f5f0e8" font-size="48" font-weight="700">$12.00</text>
  <rect x="610" y="356" width="250" height="60" rx="30" fill="#f86343"/>
  <text x="652" y="394" fill="#090909" font-size="24" font-weight="600">Add to cart</text>
  <rect x="610" y="456" width="470" height="12" rx="6" fill="#f5f0e8" opacity="0.08"/>
  <rect x="610" y="486" width="430" height="12" rx="6" fill="#f5f0e8" opacity="0.08"/>
  <rect x="610" y="516" width="380" height="12" rx="6" fill="#f5f0e8" opacity="0.08"/>

  <text x="600" y="630" text-anchor="middle" fill="#7a7060" font-size="20" letter-spacing="4">STOREFRONT PLACEHOLDER</text>
</svg>
