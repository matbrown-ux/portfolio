<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>

  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- pipeline / lead-capture flow motif -->
  <g>
    <text x="1100" y="180" fill="#7a7060" font-size="22" letter-spacing="2">LEAD PIPELINE</text>

    <!-- source nodes -->
    <rect x="1100" y="250" width="170" height="64" rx="10" fill="none" stroke="#1c1c1c"/>
    <text x="1132" y="290" fill="#f5f0e8" font-size="26">Angi</text>
    <rect x="1330" y="250" width="190" height="64" rx="10" fill="none" stroke="#1c1c1c"/>
    <text x="1362" y="290" fill="#f5f0e8" font-size="26">Thumbtack</text>

    <!-- connectors to AI node -->
    <path d="M1185 314 V370 Q1185 400 1230 400 H1310" fill="none" stroke="#7a7060" stroke-width="2"/>
    <path d="M1425 314 V370 Q1425 400 1380 400 H1310" fill="none" stroke="#7a7060" stroke-width="2"/>

    <!-- AI flow node (highlight) -->
    <rect x="1180" y="400" width="260" height="78" rx="12" fill="#f86343"/>
    <text x="1218" y="448" fill="#090909" font-size="28" font-weight="600">n8n AI flow</text>

    <!-- down to capture -->
    <path d="M1310 478 V548" fill="none" stroke="#f86343" stroke-width="3"/>
    <circle cx="1310" cy="548" r="7" fill="#f86343"/>

    <!-- captured lead -->
    <rect x="1180" y="560" width="260" height="78" rx="12" fill="none" stroke="#f86343"/>
    <text x="1212" y="608" fill="#f5f0e8" font-size="28">Lead captured</text>

    <text x="1100" y="720" fill="#f5f0e8" font-size="40" font-weight="600">Source attribution</text>
    <text x="1100" y="762" fill="#7a7060" font-size="24">Every lead tracked &amp; routed</text>
  </g>

  <!-- left content -->
  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">CASE STUDY — 02</text>

  <text x="106" y="430" fill="#f5f0e8" font-size="130" font-weight="700" letter-spacing="-5">The Booking</text>
  <text x="106" y="560" fill="#f5f0e8" font-size="130" font-weight="700" letter-spacing="-5">Flow</text>

  <text x="112" y="640" fill="#7a7060" font-size="28">SaaS lead capture for service businesses</text>

  <g font-size="22" fill="#f5f0e8">
    <rect x="112" y="730" width="108" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="140" y="763">SaaS</text>
    <rect x="236" y="730" width="248" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="264" y="763">UX/UI Engineering</text>
    <rect x="500" y="730" width="160" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="528" y="763">Branding</text>
    <rect x="676" y="730" width="172" height="52" rx="26" fill="none" stroke="#1c1c1c"/>
    <text x="704" y="763">AI Workflows</text>
  </g>
</svg>
