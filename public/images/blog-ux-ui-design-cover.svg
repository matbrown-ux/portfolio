<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>

  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- UI component panel stack motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">COMPONENTS</text>

    <!-- back panel -->
    <rect x="1210" y="320" width="300" height="250" rx="16" fill="#090909" stroke="#1c1c1c"/>
    <!-- front panel -->
    <rect x="1130" y="370" width="300" height="250" rx="16" fill="#141414" stroke="#1c1c1c"/>

    <!-- window dots -->
    <circle cx="1162" cy="404" r="6" fill="#f86343"/>
    <circle cx="1182" cy="404" r="6" fill="#7a7060"/>
    <circle cx="1202" cy="404" r="6" fill="#7a7060"/>

    <!-- text rows -->
    <rect x="1162" y="436" width="236" height="14" rx="7" fill="#f5f0e8" opacity="0.18"/>
    <rect x="1162" y="466" width="190" height="14" rx="7" fill="#f5f0e8" opacity="0.12"/>
    <rect x="1162" y="496" width="210" height="14" rx="7" fill="#f5f0e8" opacity="0.12"/>

    <!-- vermilion button -->
    <rect x="1162" y="540" width="130" height="42" rx="21" fill="#f86343"/>
    <rect x="1306" y="540" width="92" height="42" rx="21" fill="none" stroke="#1c1c1c"/>

    <text x="1140" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Design engineering</text>
    <text x="1140" y="742" fill="#7a7060" font-size="24">Where design meets code</text>
  </g>

  <!-- left content -->
  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>

  <text x="106" y="430" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">UX/UI</text>
  <text x="106" y="565" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">Design</text>

  <text x="112" y="650" fill="#7a7060" font-size="28">Component architecture · Accessibility · Motion</text>
</svg>
