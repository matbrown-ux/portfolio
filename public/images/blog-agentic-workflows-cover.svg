<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- agent node graph motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">AGENTS</text>

    <!-- connectors -->
    <path d="M1300 300 V360 M1300 360 H1180 V410 M1300 360 H1420 V410 M1300 410 V470" fill="none" stroke="#7a7060" stroke-width="2"/>
    <line x1="1180" y1="470" x2="1180" y2="520" stroke="#f86343" stroke-width="2"/>

    <!-- root node -->
    <rect x="1240" y="262" width="120" height="56" rx="12" fill="#f86343"/>
    <text x="1268" y="297" fill="#090909" font-size="22" font-weight="600">agent</text>

    <!-- tool nodes -->
    <rect x="1120" y="410" width="120" height="56" rx="12" fill="none" stroke="#1c1c1c"/>
    <text x="1150" y="445" fill="#f5f0e8" font-size="20">tool</text>
    <rect x="1360" y="410" width="120" height="56" rx="12" fill="none" stroke="#1c1c1c"/>
    <text x="1390" y="445" fill="#f5f0e8" font-size="20">tool</text>
    <rect x="1240" y="410" width="120" height="56" rx="12" fill="none" stroke="#1c1c1c"/>
    <text x="1262" y="445" fill="#f5f0e8" font-size="20">model</text>

    <!-- result node -->
    <circle cx="1180" cy="548" r="14" fill="#f86343"/>

    <text x="1140" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Real orchestration</text>
    <text x="1140" y="742" fill="#7a7060" font-size="24">Claude · AI SDK · tool use</text>
  </g>

  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>
  <text x="106" y="430" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">Agentic</text>
  <text x="106" y="565" fill="#f5f0e8" font-size="140" font-weight="700" letter-spacing="-5">Workflows</text>
  <text x="112" y="650" fill="#7a7060" font-size="28">Tool use · Orchestration · Automation</text>
</svg>
