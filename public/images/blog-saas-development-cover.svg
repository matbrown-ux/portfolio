<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#1c1c1c" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#090909"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  <rect x="1020" y="0" width="580" height="900" fill="#0e0e0e"/>
  <line x1="1020" y1="0" x2="1020" y2="900" stroke="#1c1c1c" stroke-width="1"/>

  <!-- product dashboard motif -->
  <g>
    <text x="1140" y="200" fill="#7a7060" font-size="22" letter-spacing="2">PRODUCT</text>

    <!-- dashboard panel -->
    <rect x="1140" y="250" width="330" height="300" rx="16" fill="#141414" stroke="#1c1c1c"/>
    <!-- metric -->
    <text x="1166" y="316" fill="#7a7060" font-size="20">MRR</text>
    <text x="1166" y="372" fill="#f5f0e8" font-size="56" font-weight="700">$24k</text>
    <rect x="1300" y="338" width="86" height="34" rx="17" fill="#f86343"/>
    <text x="1318" y="361" fill="#090909" font-size="20" font-weight="600">+18%</text>
    <!-- chart bars -->
    <rect x="1166" y="470" width="34" height="40" rx="4" fill="#f5f0e8" opacity="0.16"/>
    <rect x="1212" y="452" width="34" height="58" rx="4" fill="#f5f0e8" opacity="0.16"/>
    <rect x="1258" y="430" width="34" height="80" rx="4" fill="#f5f0e8" opacity="0.22"/>
    <rect x="1304" y="408" width="34" height="102" rx="4" fill="#f86343"/>
    <rect x="1350" y="386" width="34" height="124" rx="4" fill="#f86343" opacity="0.55"/>

    <text x="1140" y="700" fill="#f5f0e8" font-size="40" font-weight="600">Shipped end to end</text>
    <text x="1140" y="742" fill="#7a7060" font-size="24">React · Supabase · Auth</text>
  </g>

  <rect x="110" y="150" width="5" height="120" fill="#f86343"/>
  <text x="140" y="180" fill="#7a7060" font-size="24" letter-spacing="6">TOPIC</text>
  <text x="106" y="430" fill="#f5f0e8" font-size="150" font-weight="700" letter-spacing="-5">SaaS</text>
  <text x="106" y="565" fill="#f5f0e8" font-size="128" font-weight="700" letter-spacing="-5">Development</text>
  <text x="112" y="648" fill="#7a7060" font-size="28">React · Supabase · Dashboards</text>
</svg>
