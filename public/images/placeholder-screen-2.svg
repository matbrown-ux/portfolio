<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" font-family="Poppins, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="675" fill="#0e0e0e"/>
  <!-- window chrome -->
  <rect x="0" y="0" width="1200" height="48" fill="#090909"/>
  <circle cx="28" cy="24" r="6" fill="#f86343"/>
  <circle cx="50" cy="24" r="6" fill="#7a7060"/>
  <circle cx="72" cy="24" r="6" fill="#7a7060"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#1c1c1c"/>

  <!-- stat cards -->
  <g>
    <rect x="80" y="96" width="320" height="120" rx="12" fill="#141414" stroke="#1c1c1c"/>
    <rect x="104" y="120" width="80" height="10" rx="5" fill="#7a7060"/>
    <text x="104" y="180" fill="#f5f0e8" font-size="44" font-weight="700">$24k</text>
    <rect x="440" y="96" width="320" height="120" rx="12" fill="#141414" stroke="#1c1c1c"/>
    <rect x="464" y="120" width="80" height="10" rx="5" fill="#7a7060"/>
    <text x="464" y="180" fill="#f5f0e8" font-size="44" font-weight="700">1,280</text>
    <rect x="800" y="96" width="320" height="120" rx="12" fill="#141414" stroke="#1c1c1c"/>
    <rect x="824" y="120" width="80" height="10" rx="5" fill="#7a7060"/>
    <text x="824" y="180" fill="#f86343" font-size="44" font-weight="700">+18%</text>
  </g>

  <!-- chart -->
  <rect x="80" y="248" width="1040" height="300" rx="12" fill="#141414" stroke="#1c1c1c"/>
  <polyline points="120,480 260,440 400,460 540,380 680,400 820,320 960,340 1080,280"
    fill="none" stroke="#f86343" stroke-width="3"/>
  <g fill="#f5f0e8">
    <circle cx="120" cy="480" r="5"/><circle cx="400" cy="460" r="5"/>
    <circle cx="680" cy="400" r="5"/><circle cx="960" cy="340" r="5"/>
  </g>

  <text x="600" y="610" text-anchor="middle" fill="#7a7060" font-size="20" letter-spacing="4">SCREENSHOT PLACEHOLDER</text>
</svg>
